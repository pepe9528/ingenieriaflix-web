<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión | IngenieríaFlex</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0f1e;
      font-family: 'Segoe UI', system-ui, sans-serif;
      padding: 1rem;
    }

    .bg-glow {
      position: fixed;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.15;
      pointer-events: none;
    }
    .bg-glow.one { background: #3b82f6; top: -100px; left: -100px; }
    .bg-glow.two { background: #8b5cf6; bottom: -100px; right: -100px; }

    .card {
      position: relative;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 420px;
      backdrop-filter: blur(20px);
    }

    .logo-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 2rem;
    }

    .logo-wrap img {
      width: 40px;
      height: 40px;
      object-fit: contain;
    }

    .logo-wrap h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: #fff;
    }

    .logo-wrap h1 span {
      color: #3b82f6;
    }

    h2 {
      font-size: 1.1rem;
      font-weight: 500;
      color: rgba(255,255,255,0.85);
      text-align: center;
      margin-bottom: 1.75rem;
    }

    .field {
      margin-bottom: 1rem;
    }

    .field label {
      display: block;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.5);
      margin-bottom: 6px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .field input {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 0.75rem 1rem;
      font-size: 0.95rem;
      color: #fff;
      outline: none;
      transition: border-color 0.2s;
    }

    .field input::placeholder { color: rgba(255,255,255,0.25); }

    .field input:focus {
      border-color: #3b82f6;
      background: rgba(59,130,246,0.08);
    }

    .error-msg {
      display: none;
      background: rgba(239,68,68,0.12);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 8px;
      padding: 0.6rem 0.9rem;
      font-size: 0.85rem;
      color: #fca5a5;
      margin-bottom: 1rem;
    }

    .btn-primary {
      width: 100%;
      padding: 0.8rem;
      background: #3b82f6;
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-bottom: 0.75rem;
    }

    .btn-primary:hover { background: #2563eb; }
    .btn-primary:active { transform: scale(0.98); }

    .forgot {
      display: block;
      text-align: center;
      font-size: 0.82rem;
      color: rgba(255,255,255,0.35);
      text-decoration: none;
      margin-bottom: 1.5rem;
      transition: color 0.2s;
    }
    .forgot:hover { color: #3b82f6; }

    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 1rem;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.08);
    }
    .divider span {
      font-size: 0.78rem;
      color: rgba(255,255,255,0.3);
      white-space: nowrap;
    }

    .btn-social {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 0.75rem;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: rgba(255,255,255,0.8);
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      margin-bottom: 0.75rem;
    }
    .btn-social:hover {
      background: rgba(255,255,255,0.09);
      border-color: rgba(255,255,255,0.2);
    }
    .btn-social i { font-size: 1rem; }
    .btn-social.google i { color: #ea4335; }

    .register-wrap {
      text-align: center;
      margin-top: 1.25rem;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.35);
    }

    .btn-register {
      background: none;
      border: none;
      color: #3b82f6;
      font-size: 0.85rem;
      cursor: pointer;
      font-weight: 600;
      padding: 0;
    }
    .btn-register:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <div class="bg-glow one"></div>
  <div class="bg-glow two"></div>

  <div class="card">
    <div class="logo-wrap">
      <img src="../img/logo.png" alt="Logo">
      <h1>Ingeniería<span>Flex</span></h1>
    </div>

    <h2>Inicia sesión en tu cuenta</h2>

    <div id="errorMsg" class="error-msg"></div>

    <div class="field">
      <label>Correo electrónico</label>
      <input id="email" type="email" placeholder="tu@correo.com">
    </div>

    <div class="field">
      <label>Contraseña</label>
      <input id="password" type="password" placeholder="••••••••">
    </div>

    <button id="loginBtn" class="btn-primary">Iniciar sesión</button>

    <a href="#" class="forgot">¿Olvidaste tu contraseña?</a>

    <div class="divider"><span>o continúa con</span></div>

    <button id="googleBtn" class="btn-social google">
      <i class="fab fa-google"></i> Iniciar con Google
    </button>

    <div class="register-wrap">
      ¿No tienes cuenta?
      <button id="registerBtn" class="btn-register">Regístrate aquí</button>
    </div>
  </div>

  <script type="module" src="/login/js/auth.js"></script>

</body>
</html>
