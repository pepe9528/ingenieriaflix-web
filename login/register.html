<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="/img/logo.png">
  <title>Registro | IngenieríaFlex</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0f1e;
      font-family: 'Segoe UI', system-ui, sans-serif;
      padding: 1rem;
    }

    .bg-glow {
      position: fixed;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.15;
      pointer-events: none;
    }
    .bg-glow.one { background: #8b5cf6; top: -100px; right: -100px; }
    .bg-glow.two { background: #3b82f6; bottom: -100px; left: -100px; }

    .back-btn {
      position: fixed;
      top: 1.2rem;
      left: 1.2rem;
      display: flex;
      align-items: center;
      gap: 6px;
      color: rgba(255,255,255,0.5);
      text-decoration: none;
      font-size: 0.88rem;
      transition: color 0.2s;
      z-index: 10;
    }
    .back-btn:hover { color: #fff; }

    .card {
      position: relative;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 440px;
      backdrop-filter: blur(20px);
    }

    .logo-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 1.5rem;
    }
    .logo-wrap img { width: 40px; height: 40px; object-fit: contain; }
    .logo-wrap h1 { font-size: 1.4rem; font-weight: 700; color: #fff; }
    .logo-wrap h1 span { color: #8b5cf6; }

    h2 {
      font-size: 1.1rem;
      font-weight: 500;
      color: rgba(255,255,255,0.85);
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .field { margin-bottom: 1rem; }
    .field label {
      display: block;
      font-size: 0.78rem;
      color: rgba(255,255,255,0.5);
      margin-bottom: 6px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .field input {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 0.75rem 1rem;
      font-size: 0.95rem;
      color: #fff;
      outline: none;
      transition: border-color 0.2s;
    }
    .field input::placeholder { color: rgba(255,255,255,0.25); }
    .field input:focus { border-color: #8b5cf6; background: rgba(139,92,246,0.08); }

    .error-msg {
      display: none;
      background: rgba(239,68,68,0.12);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 8px;
      padding: 0.6rem 0.9rem;
      font-size: 0.85rem;
      color: #fca5a5;
      margin-bottom: 1rem;
    }

    .success-msg {
      display: none;
      background: rgba(52,211,153,0.12);
      border: 1px solid rgba(52,211,153,0.3);
      border-radius: 8px;
      padding: 0.6rem 0.9rem;
      font-size: 0.85rem;
      color: #6ee7b7;
      margin-bottom: 1rem;
      text-align: center;
    }

    .btn-primary {
      width: 100%;
      padding: 0.8rem;
      background: #8b5cf6;
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-bottom: 0.75rem;
    }
    .btn-primary:hover { background: #7c3aed; }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { background: #4c1d95; cursor: not-allowed; }

    .login-wrap {
      text-align: center;
      margin-top: 1rem;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.35);
    }
    .login-wrap a { color: #8b5cf6; text-decoration: none; font-weight: 600; }
    .login-wrap a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <div class="bg-glow one"></div>
  <div class="bg-glow two"></div>

  <a href="/login/login.html" class="back-btn">
    <i class="fa-solid fa-arrow-left"></i> Volver al login
  </a>

  <div class="card">
    <div class="logo-wrap">
      <img src="../img/logo.png" alt="Logo">
      <h1>Ingeniería<span>Flex</span></h1>
    </div>

    <h2>Crea tu cuenta</h2>

    <div id="errorMsg" class="error-msg"></div>
    <div id="successMsg" class="success-msg"></div>

    <div class="field">
      <label>Nombre completo</label>
      <input id="regName" type="text" placeholder="Tu nombre">
    </div>
    <div class="field">
      <label>Correo electrónico</label>
      <input id="regEmail" type="email" placeholder="tu@correo.com">
    </div>
    <div class="field">
      <label>Contraseña</label>
      <input id="regPassword" type="password" placeholder="Mínimo 6 caracteres">
    </div>
    <div class="field">
      <label>Confirmar contraseña</label>
      <input id="regPassword2" type="password" placeholder="Repite tu contraseña">
    </div>

    <button id="registerBtn" class="btn-primary">Crear cuenta</button>

    <div class="login-wrap">
      ¿Ya tienes cuenta? <a href="/login/login.html">Inicia sesión</a>
    </div>
  </div>

  <script type="module">
    import { auth } from "/login/js/firebase-config.js";
    import {
      createUserWithEmailAndPassword,
      updateProfile,
      sendEmailVerification
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    document.getElementById("registerBtn").addEventListener("click", async () => {
      const name     = document.getElementById("regName").value.trim();
      const email    = document.getElementById("regEmail").value.trim();
      const pass     = document.getElementById("regPassword").value;
      const pass2    = document.getElementById("regPassword2").value;
      const errorEl  = document.getElementById("errorMsg");
      const successEl = document.getElementById("successMsg");

      errorEl.style.display = "none";
      successEl.style.display = "none";

      if (!name || !email || !pass || !pass2) {
        mostrarError("Por favor llena todos los campos.");
        return;
      }
      if (pass.length < 6) {
        mostrarError("La contraseña debe tener al menos 6 caracteres.");
        return;
      }
      if (pass !== pass2) {
        mostrarError("Las contraseñas no coinciden.");
        return;
      }

      const btn = document.getElementById("registerBtn");
      btn.textContent = "Creando cuenta...";
      btn.disabled = true;

      try {
        const cred = await createUserWithEmailAndPassword(auth, email, pass);
        await updateProfile(cred.user, { displayName: name });
        await sendEmailVerification(cred.user);

        successEl.textContent = "¡Cuenta creada! Revisa tu correo para verificarla.";
        successEl.style.display = "block";

        setTimeout(() => window.location.replace("/login/login.html"), 3000);

      } catch (error) {
        mostrarError(traducirError(error.code));
        btn.textContent = "Crear cuenta";
        btn.disabled = false;
      }
    });

    function mostrarError(msg) {
      const el = document.getElementById("errorMsg");
      el.textContent = msg;
      el.style.display = "block";
    }

    function traducirError(code) {
      const errores = {
        "auth/email-already-in-use": "Este correo ya está registrado.",
        "auth/invalid-email": "Correo electrónico inválido.",
        "auth/weak-password": "La contraseña es muy débil.",
        "auth/too-many-requests": "Demasiados intentos. Intenta más tarde.",
      };
      return errores[code] || "Error al crear la cuenta. Intenta de nuevo.";
    }
  </script>

<div id="sidebarOverlay"></div>
</body>
</html>
