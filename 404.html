<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="/img/logo.png">
  <title>404 — Página no encontrada | IngenieríaFlex</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    .not-found {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 80vh;
      text-align: center;
      padding: 20px;
      gap: 1.2rem;
    }
    .not-found .code {
      font-size: 7rem;
      font-weight: 900;
      color: red;
      line-height: 1;
      letter-spacing: -4px;
    }
    .not-found h2 {
      font-size: 1.6rem;
      color: #fff;
    }
    .not-found p {
      color: #666;
      max-width: 420px;
      font-size: 1rem;
      line-height: 1.7;
    }
    .btn-home {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: red;
      color: #fff;
      padding: 14px 32px;
      border-radius: 40px;
      text-decoration: none;
      font-weight: 600;
      font-size: 1rem;
      transition: background 0.2s, transform 0.1s;
      margin-top: 8px;
    }
    .btn-home:hover { background: #cc0000; transform: translateY(-2px); color: #fff; }
  </style>
</head>
<body>

  <header class="navbar">
    <div class="logo-area">
      <img src="/img/logo.png" alt="Logo IngenieríaFlex" class="logo">
      <h1>Ingeniería<span>Flex</span></h1>
    </div>
  </header>

  <div class="not-found">
    <div class="code"><i class="fa-solid fa-triangle-exclamation"></i> 404</div>
    <h2>¡Ups! Página no encontrada</h2>
    <p>La página que buscas no existe, fue movida o el enlace está roto. Pero no te preocupes, todavía hay mucho por aprender.</p>
    <a href="/index.html" class="btn-home">
      <i class="fa-solid fa-house"></i> Volver al inicio
    </a>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
