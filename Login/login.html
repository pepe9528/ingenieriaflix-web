<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión | IngenieríaFlex</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    body {
      background: linear-gradient(135deg, #0f172a, #1e293b);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff;
    }
    .login-card {
      background-color: #1e293b;
      border-radius: 20px;
      padding: 2rem;
      width: 420px;
      box-shadow: 0 0 20px rgba(0,0,0,0.4);
    }
    .logo-login {
      width: 120px;
      height: auto;
      object-fit: contain;
      transition: .8s;
    }
    .logo-login:hover {
      transform: rotate(360deg) scale(1.1);
    }
    .divider {
      text-align: center;
      margin: 1rem 0;
      color: #94a3b8;
    }
  </style>
</head>
<body>

  <div class="login-card text-center">
    <img src="../img/logo.png" class="logo-login mb-3" alt="IngenieríaFlex Logo">
    <h3 class="mb-4">Iniciar sesión en tu cuenta</h3>

    <input id="email" type="email" class="form-control mb-3" placeholder="Correo electrónico o usuario">
    <input id="password" type="password" class="form-control mb-3" placeholder="Contraseña">

    <button id="loginBtn" class="btn btn-primary w-100 mb-3">Iniciar sesión</button>

    <a href="#" class="text-light small d-block mb-3">¿Olvidaste tu contraseña?</a>

    <div class="divider">O continúa con</div>

    <button id="googleBtn" class="btn btn-danger w-100 mb-2">
      <i class="fab fa-google"></i> Iniciar con Google
    </button>

    <button id="githubBtn" class="btn btn-dark w-100 mb-3">
      <i class="fab fa-github"></i> Iniciar con GitHub
    </button>

    <div class="divider">¿No tienes cuenta?</div>

    <button id="registerBtn" class="btn btn-success w-100">Regístrate aquí</button>
  </div>

  <!-- 🔑 Importación corregida -->
    <script type="module" src="/login/js/auth.js"></script>

</body>
</html>
