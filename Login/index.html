<!DOCTYPE html>
<html lang="es">

<head>
          
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Login</title>

    <link
        rel="stylesheet"
        href="styles.css"
    >
</head>
<body>
            
    <div class="login-container">
        


        <!-- LOGO -->
        <a
         href="../index.html"
         class="back-btn">   

            ← Volver

        </a>    
        <img

            src="../img/logo.png"

            alt="Logo"

            class="logo"

        >



        <!-- FORMULARIO -->

        <form class="login-form">


            <h2>

                Iniciar sesión

            </h2>



            <input

                type="email"

                placeholder="Correo electrónico"

                required

            >



            <input

                type="password"

                placeholder="Contraseña"

                required

            >



            <label class="remember">

                <input type="checkbox">

                Recordarme

            </label>



            <button type="submit">

                Entrar

            </button>



            <a href="#">

                Olvidé mi contraseña

            </a>


        </form>


    </div>
    <script src="java.js"></script>

</body>

</html>
