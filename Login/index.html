<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Seguro | Mi Empresa</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-card">
        <header>
            <img src="img/logo.png" alt="Logo" class="brand-logo">
            <h1>Bienvenido</h1>
            <p>Accede con tu cuenta profesional</p>
        </header>

        <div class="auth-buttons">
            <button id="btn-google" class="btn-social google">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="">
                Continuar con Google
            </button>
            
            <button id="btn-facebook" class="btn-social facebook">
                <img src="https://upload.wikimedia.org/wikipedia/commons/0/05/Facebook_Logo_(2019).png" alt="">
                Continuar con Facebook
            </button>
        </div>

        <div class="divider"><span>o</span></div>

        <div id="auth-message"></div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
